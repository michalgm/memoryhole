services:
  db:
    image: postgres:16
    restart: always
    env_file:
      - .env.db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER}"]
      interval: 10s
      retries: 6
      start_period: 10s
      timeout: 10s
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh

  protonmail-bridge:
    image: shenxn/protonmail-bridge
    container_name: pm_bridge
    ports:
      - 127.0.0.1:1025:25/tcp
    restart: unless-stopped
    stdin_open: true
    tty: true
    volumes:
      - protonmail:/root

  migrate:
    image: ghcr.io/michalgm/memoryhole-migrate:${IMAGE_TAG:-latest}
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://$PG_USER:$PG_PASS@db:5432/memoryhole
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  api:
    image: ghcr.io/michalgm/memoryhole-api:${IMAGE_TAG:-latest}
    env_file:
      - .env
    ports:
      - '8911:8911'
      - '8910:8910'
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgresql://$PG_USER:$PG_PASS@db:5432/memoryhole
      - TEST_DATABASE_URL=postgresql://$PG_USER:$PG_PASS@db:5432/memoryhole_test

  web:
    image: ghcr.io/michalgm/memoryhole-web:${IMAGE_TAG:-latest}
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    environment:
      - DOMAIN=$DOMAIN
    volumes:
      - caddy_data:/data
    depends_on:
      - api
    stop_grace_period: 5s

  console:
    image: ghcr.io/michalgm/memoryhole-api:${IMAGE_TAG:-latest}
    user: root
    tmpfs:
      - /tmp
    command: 'true'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://$PG_USER:$PG_PASS@db:5432/memoryhole
      - TEST_DATABASE_URL=postgresql://$PG_USER:$PG_PASS@db:5432/memoryhole_test
    depends_on:
      - db

volumes:
  pg_data:
  caddy_data:
  protonmail:
