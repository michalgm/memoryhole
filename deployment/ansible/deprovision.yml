---
# ============================================================================
# DEPROVISION - Full teardown (server wipe + Linode infrastructure deletion)
# ============================================================================
# Imports both deprovision plays in sequence:
#   1. deprovision-server.yml — stops services, securely erases all data
#   2. deprovision-linode.yml — deletes Linode instance and block storage
#
# To run only one step, use the component playbooks directly:
#   ansible-playbook -i inventory.yml deprovision-server.yml --extra-vars "confirm_destroy=yes"
#   ansible-playbook -i inventory.yml deprovision-linode.yml --extra-vars "confirm_destroy=yes"
#
# Usage:
#   ansible-playbook -i inventory.yml deprovision.yml --extra-vars "confirm_destroy=yes"
#
# Requires: LINODE_TOKEN environment variable
# ============================================================================

- import_playbook: deprovision-server.yml
- import_playbook: deprovision-linode.yml
