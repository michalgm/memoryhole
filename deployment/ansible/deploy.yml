---
# ============================================================================
# Memoryhole Full Server Setup
# ============================================================================
# Runs all setup steps in order. Individual playbooks can still be run
# standalone for partial re-runs or targeted changes.
#
# Usage:
#   ansible-playbook -i inventory.yml deploy.yml
#
# To run only specific steps, use tags:
#   ansible-playbook -i inventory.yml deploy.yml --tags init,encrypted_volume
#
# Available tags: init, encrypted_volume, security, caddy, deploy
# ============================================================================

# Prompt for sensitive values at runtime so they never need to live in all.yml.
# Leave any prompt blank to fall back to the value already set in all.yml

- name: Gather deployment variables
  hosts: all
  gather_facts: false
  tags: [always]
  tasks:
    - name: Check if encrypted volume is already mounted
      command: mountpoint -q {{ encrypted_volume_mount }}
      register: _volume_mounted
      failed_when: false
      changed_when: false
      when: use_encrypted_volume | default(true)

    - name: Prompt for disk encryption passphrase
      pause:
        prompt: |

          Disk encryption passphrase
          ──────────────────────────
          Tips:
            • Generate one with: openssl rand -base64 32
            • Store it in a password manager AND keep an offline copy
            • There is NO recovery if you lose it — LUKS cannot be bypassed

          Leave blank to use the value already set in all.yml

          Passphrase
        echo: false
      register: _passphrase_result
      when:
        - use_encrypted_volume | default(true)
        - _volume_mounted.rc | default(1) != 0

    - name: Confirm disk encryption passphrase
      pause:
        prompt: "Confirm passphrase"
        echo: false
      register: _passphrase_confirm
      when:
        - use_encrypted_volume | default(true)
        - _volume_mounted.rc | default(1) != 0
        - _passphrase_result.user_input | default('') | length > 0

    - name: Fail if passphrases do not match
      fail:
        msg: "Passphrases do not match. Re-run deploy.yml and try again."
      when:
        - use_encrypted_volume | default(true)
        - _volume_mounted.rc | default(1) != 0
        - _passphrase_result.user_input | default('') | length > 0
        - _passphrase_result.user_input != _passphrase_confirm.user_input

    - name: Set passphrase fact
      set_fact:
        encrypted_volume_passphrase: "{{ _passphrase_result.user_input }}"
      when:
        - use_encrypted_volume | default(true)
        - _volume_mounted.rc | default(1) != 0
        - _passphrase_result.user_input | default('') | length > 0

    - name: Prompt for initial admin password
      pause:
        prompt: "Initial admin password for {{ admin_user_email | default('the admin user') }}"
        echo: false
      register: _admin_password_result
      when: (admin_user_email | default('')) | length > 0

    - name: Confirm initial admin password
      pause:
        prompt: "Confirm initial admin password"
        echo: false
      register: _admin_password_confirm
      when:
        - (admin_user_email | default('')) | length > 0
        - _admin_password_result.user_input | default('') | length > 0

    - name: Fail if passwords do not match
      fail:
        msg: "Passwords do not match. Re-run deploy.yml and try again."
      when:
        - (admin_user_email | default('')) | length > 0
        - _admin_password_result.user_input | default('') | length > 0
        - _admin_password_result.user_input != _admin_password_confirm.user_input

    - name: Set admin password fact
      set_fact:
        admin_user_password: "{{ _admin_password_result.user_input | default('') }}"
      when: (admin_user_email | default('')) | length > 0

    - name: Validate admin_user_email is set
      assert:
        that: admin_user_email is defined and admin_user_email | length > 0
        fail_msg: >-
          admin_user_email is required. Set it in group_vars/all/main.yml and re-run.

    - name: Validate admin_user_password is set
      assert:
        that: admin_user_password is defined and admin_user_password | length > 0
        fail_msg: >-
          admin_user_password is required. Re-run deploy.yml and enter a password at the prompt.

- import_playbook: playbooks/01-init-server.yml
  tags: [init]

- import_playbook: playbooks/02-setup-encrypted-volume.yml
  tags: [encrypted_volume]

- import_playbook: playbooks/03-security-hardening.yml
  tags: [security]

- import_playbook: playbooks/04-setup-caddy.yml
  tags: [caddy]

- import_playbook: playbooks/05-deploy-instances.yml
  tags: [deploy]
