---
# Ansible Variables — copy this to group_vars/all/main.yml and fill in the values below.
# Everything else has sensible defaults in group_vars/all/defaults.yml and rarely needs changing.

# Initial admin user — also used for Let's Encrypt cert notifications, fail2ban alerts, and monitoring.
# Password is prompted interactively when deploy.yml runs.
admin_user_email: admin@example.com
admin_user_name: Admin

# Path to your SSH public key on the control machine (the machine running Ansible)
linux_user_ssh_key_file: ~/.ssh/id_ed25519.pub

# ==============================================================================
# DISK ENCRYPTION
# ==============================================================================

# Set to false to skip LUKS encryption (not recommended for production)
use_fde: true

# Block device to encrypt. Check with: lsblk
encrypted_volume_device: /dev/sdc

# Strong passphrase — store in a password manager and offline backup.
# There is NO recovery if you lose it. You can leave this unset and enter it
# interactively when deploy.yml runs instead.
# encrypted_volume_passphrase: ''

# ==============================================================================
# INSTANCES
# ==============================================================================
# Each entry deploys one isolated Memoryhole stack.
# Multiple instances can run on the same server — add more entries to the list.
#
# Per-instance options:
#   domain              - required: fully qualified domain name
#   seed_jurisdictions  - comma-separated list of jurisdiction values to pre-load
#   seed_cities         - comma-separated list of city values to pre-load
#   image_tag           - pin to a release, e.g. v0.28.0 (default: latest)
#   backup_enabled      - enable nightly database backups (default: true)
#   backup_retention_days - days to keep backups (default: 7)

instances:
  - domain: memoryhole.example.com
    seed_jurisdictions: 'County Court,Federal Court'
    seed_cities: 'Springfield,Shelbyville'

  # Example: staging instance on the same server
  # - domain: staging.example.com
  #   image_tag: main  # track a branch instead of releases
