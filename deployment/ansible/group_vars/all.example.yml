---
# Ansible Variables Template
# Copy this to group_vars/all.yml and customize

# Email for system notifications
admin_email: admin@example.com

# ==============================================================================
# USER CONFIGURATION
# ==============================================================================

# Primary linux user (will be created and given sudo access)
linux_username: memoryhole
linux_user_password_hash: '$6$rounds=656000$CHANGEME' # Generate with: mkpasswd --method=sha-512
linux_user_ssh_public_keys:
  - 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... user@laptop' # Replace with your public key
  - 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAI... user@desktop'

# Disable root login after linux user is created
disable_root_login: true

# ==============================================================================
# SSH CONFIGURATION
# ==============================================================================

ssh_port: 2222 # Non-standard port to reduce automated attacks
ssh_allow_password_auth: false # Only allow key-based authentication
ssh_permit_root_login: 'no'
ssh_max_auth_tries: 3
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2

# ==============================================================================
# FIREWALL (UFW) CONFIGURATION
# ==============================================================================

firewall_allowed_tcp_ports:
  - '{{ ssh_port }}' # SSH
  - '80' # HTTP (for Let's Encrypt challenges)
  - '443' # HTTPS

firewall_allowed_udp_ports: []

firewall_rate_limit_ssh: true # Rate limit SSH connections

# ==============================================================================
# FAIL2BAN CONFIGURATION
# ==============================================================================

fail2ban_enabled: true
fail2ban_bantime: 3600 # 1 hour
fail2ban_findtime: 600 # 10 minutes
fail2ban_maxretry: 5
fail2ban_destemail: '{{ admin_email }}' # Alert email
fail2ban_sender: fail2ban@{{ server_hostname }}

# ==============================================================================
# ENCRYPTED VOLUME CONFIGURATION
# ==============================================================================

# LUKS encryption settings
luks_cipher: aes-xts-plain64
luks_key_size: 512
luks_hash: sha512
luks_iter_time: 5000 # Milliseconds for PBKDF2 iteration

# Passphrase for encrypted volume
# IMPORTANT: Store this securely! Generate with: openssl rand -base64 32
encrypted_volume_passphrase: 'CHANGE_ME_GENERATE_STRONG_PASSPHRASE'

# Whether to store passphrase in a keyfile (less secure but allows auto-mount)
# Set to false for maximum security (requires manual unlock on boot)
use_luks_keyfile: false
luks_keyfile_path: /root/.luks-key # Only if use_luks_keyfile=true

# ==============================================================================
# DOCKER CONFIGURATION
# ==============================================================================

docker_users:
  - '{{ linux_username }}'

# ==============================================================================
# CADDY CONFIGURATION
# ==============================================================================

# Email for Let's Encrypt certificate notifications
caddy_acme_email: '{{ admin_email }}'

# ==============================================================================
# INSTANCES
# ==============================================================================
# Each entry deploys one isolated Memoryhole stack. Add more entries for
# additional tenants or environments (staging, prod, etc.).
#
# Required per instance:
#   domain     - fully qualified domain name
#   port       - unique host port for the web container (bare-metal Caddy proxies here)
#
# Auto-generated (stored in credentials/<domain>/ on your control machine):
#   db_password, session_secret, db_encryption_key
#
# Optional per instance:
#   image_tag             - pin to a release (e.g. v0.26.0), defaults to latest
#   seed_user_name        - display name for initial admin user
#   seed_user_email       - email for initial admin (leave blank to skip seed)
#   seed_user_password    - login password for initial admin (set this intentionally)
#   seed_jurisdictions    - comma-separated list of jurisdictions to seed (optional)
#   seed_cities           - comma-separated list of cities to seed (optional)
#   backup_enabled        - default true
#   backup_retention_days - default 7

instances:
  - domain: memoryhole.example.com
    seed_user_name: 'Admin'
    seed_user_email: 'admin@example.com'
    seed_user_password: 'CHANGE_ME'
    seed_jurisdictions: 'County Court,Federal Court'
    seed_cities: 'Springfield,Shelbyville'

  # Example: staging instance on the same server
  # - domain: staging.example.com
  #   image_tag: main  # track a branch instead of releases

# ==============================================================================
# SECURITY & MONITORING
# ==============================================================================

# Automatic security updates
auto_updates_enabled: true
auto_updates_reboot: false # Don't auto-reboot (requires manual unlock)
auto_updates_time: '03:00'

# System monitoring
enable_monitoring: true
monitoring_email: '{{ admin_email }}'

# Log retention
log_retention_days: 30
