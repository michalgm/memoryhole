name: Publish Docker Images

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  OWNER: michalgm

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile
          target: api_serve
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/memoryhole-api:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/memoryhole-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile
          target: caddy_serve
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/memoryhole-web:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/memoryhole-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
